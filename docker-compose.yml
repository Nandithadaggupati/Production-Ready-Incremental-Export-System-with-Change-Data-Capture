version: '3.8'

services:
  db:
    image: postgres:13
    container_name: cdc-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - ./seeds:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydatabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: cdc-export-app:latest
    container_name: cdc-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./output:/app/output
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/mydatabase
      - PORT=8080
      - HOST=0.0.0.0
      - OUTPUT_DIR=/app/output

